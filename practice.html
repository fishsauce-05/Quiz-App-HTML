<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="quiz-page">
  <div class="quiz-container">
    <div class="top">
      <div>
        <a class="back-link" href="index.html">Trang chủ</a>
        <h1 id="subjectTitle">Quiz Lập trình Web</h1>
        <p id="quizMeta"></p>
      </div>
      <span id="progress"></span>
    </div>

    <div id="quizBox">
      <div id="question"></div>
      <div id="answers"></div>
      <div id="feedback"></div>
      <button id="nextBtn">Câu tiếp theo</button>
    </div>

    <div id="resultBox">
      <h2>Kết quả</h2>
      <p id="finalScore"></p>
      <p id="resultMessage"></p>
      <button id="restartBtn">Làm lại</button>
      <a class="secondary-btn" href="index/web.html">Đổi bài</a>
    </div>
  </div>
  <script src="question/web/webQ.js"></script>
  <script src="question/web/htmlQ.js"></script>
  <script src="question/web/cssQ.js"></script>
  <script src="question/web/jsQ.js"></script>
  <script src="question/web/mysqlQ.js"></script>
  <script src="question/web/phpQ.js"></script>
  <script src="question/web/bootstrapQ.js"></script>
  <script src="question/web/jqueryQ.js"></script>
  <script src="question/cnxh/cnxhPTIT.js"></script>
  <script src="questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
