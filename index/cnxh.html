<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Quiz - Chủ nghĩa xã hội khoa học</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body class="home-page">
  <main class="home-shell">
    <header class="home-header">
      <a class="back-link" href="../index.html">Trang chủ</a>
      <p class="kicker">Practice Quiz</p>
      <h1>Chọn bài Chủ nghĩa xã hội khoa học</h1>
    </header>

    <form id="startForm" class="home-form" action="../practice.html">
      <section class="home-section" aria-labelledby="subjectHeading">
        <h2 id="subjectHeading">Bài tập</h2>
        <div id="subjectList" class="subject-list"></div>
      </section>

      <section class="home-section" aria-labelledby="limitHeading">
        <h2 id="limitHeading">Số câu</h2>
        <div class="limit-row">
          <label for="questionLimit">Tối đa</label>
          <input id="questionLimit" name="limit" type="number" min="1" value="20">
          <span id="questionTotal" class="limit-total"></span>
        </div>
        <div class="quick-limits" aria-label="Chọn nhanh số câu">
          <button type="button" data-limit="10">10 câu</button>
          <button type="button" data-limit="20">20 câu</button>
          <button type="button" data-limit="all">Tất cả</button>
        </div>
      </section>

      <button class="primary-btn" type="submit">Bắt đầu</button>
    </form>
  </main>
  <script src="../question/cnxh/cnxhPTIT.js"></script>
  <script src="../question/cnxh/chapter1.js"></script>
  <script src="../question/cnxh/chapter2.js"></script>
  <script src="../questions.js"></script>
  <script src="../home.js"></script>
</body>
</html>
